version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cs_training_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cs_training
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: